<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.logo{
width:180px;
max-width:60%;
display:block;
margin:0 auto 40px;
}

.hero{
width:100%;
border-radius:12px;
display:block;
margin-bottom:40px;
}

h1{
font-size:56px;
letter-spacing:4px;
margin-bottom:20px;
}

.desc{
color:#bdbdbd;
font-size:20px;
line-height:1.8;
max-width:600px;
margin:0 auto 50px;
}

.coming{
font-size:32px;
font-weight:bold;
letter-spacing:3px;
margin-bottom:30px;
}

.button-group{
display:flex;
flex-direction:column;
gap:15px;
max-width:320px;
margin:0 auto 80px;
}

.btn{
display:block;
padding:18px;
background:#fff;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:8px;
font-size:16px;
}

.btn:hover{
opacity:0.9;
}

footer{
color:#666;
padding:40px 20px;
font-size:14px;
border-top:1px solid #222;
}

@media(max-width:768px){

h1{
font-size:42px;
}

.desc{
font-size:18px;
}

.coming{
font-size:24px;
}

.logo{
width:140px;
}

}
</style>

</head>

<body>

<div class="container">

<h1>VALE & VANE</h1>
  
<img src="file_000000005ed872089e8ec23ea2bbfb14.png" class="hero" alt="VALE & VANE">

<h1>VALE & VANE</h1>
  
<p class="desc">
Minimal essentials designed for everyday wear.
Clean, timeless, and comfortable.
</p>

<div class="coming">
COMING SOON
</div>

<div class="button-group">

<a class="btn" href="https://instagram.com/valeandvane.co" target="_blank">
Instagram
</a>

<a class="btn" href="https://www.tiktok.com/@valeandvane.co" target="_blank">
TikTok
</a>
</div>

</div>

<footer>
© VALE & VANE. All Rights Reserved.
</footer>

</body>
</html>
